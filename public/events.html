<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events - Tesano Community Library</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header text-center">
        <div class="container">
            <h1 class="stylish-logo">Tesano Community Library</h1>
            <p class="slogan">Community Events</p>
        </div>
    </header>

    <div class="container mt-5">
        <!-- Navigation -->
        <div class="row mb-4">
            <div class="col-md-12">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i> Back to Library
                </a>
            </div>
        </div>

        <!-- Events Container -->
        <div class="row">
            <div class="col-md-12">
                <h2 class="text-center mb-4">Upcoming Community Events</h2>
                
                <!-- Loading State -->
                <div id="loading" class="text-center">
                    <div class="spinner-border text-success" role="status">
                        <span class="sr-only">Loading...</span>
                    </div>
                    <p class="mt-3">Loading events...</p>
                </div>

                <!-- Events List -->
                <div id="events-list" class="row" style="display: none;"></div>

                <!-- No Events Message -->
                <div id="no-events" class="text-center mt-5" style="display: none;">
                    <i class="fas fa-calendar-times text-muted" style="font-size: 64px;"></i>
                    <h3 class="mt-3 text-muted">No upcoming events</h3>
                    <p class="text-muted">Check back soon for new community events!</p>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="eventModalTitle">Event Details</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="eventModalBody">
                    <!-- Event details will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="registerBtn" style="display: none;">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    
    <script>
        // Automatic API URL detection
        const API_BASE_URL = (() => {
            const currentHost = window.location.hostname;
            const isLocalhost = currentHost === 'localhost' || currentHost === '127.0.0.1';
            return isLocalhost ? '' : 'https://library-backend-j90e.onrender.com';
        })();

        let authToken = localStorage.getItem('authToken');
        let currentEventId = null;

        // Load events on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadEvents();
        });

        // Load all events
        async function loadEvents() {
            try {
                const response = await fetch(`${API_BASE_URL}/events`);
                const events = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (events.length === 0) {
                    document.getElementById('no-events').style.display = 'block';
                    return;
                }

                displayEvents(events);
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-message').textContent = 'Failed to load events. Please try again later.';
                document.getElementById('error-message').style.display = 'block';
            }
        }

        // Display events
        function displayEvents(events) {
            const eventsList = document.getElementById('events-list');
            eventsList.innerHTML = '';

            events.forEach(event => {
                const eventDate = new Date(event.eventDate);
                const formattedDate = eventDate.toLocaleDateString('en-US', { 
                    weekday: 'short', 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const eventCard = document.createElement('div');
                eventCard.className = 'col-md-6 mb-4';
                eventCard.innerHTML = `
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(event.title)}</h5>
                            <p class="card-text">${escapeHtml(event.description || 'No description available')}</p>
                            <hr>
                            <p class="mb-1">
                                <i class="fas fa-calendar text-primary"></i> 
                                <strong>${formattedDate}</strong>
                            </p>
                            ${event.location ? `
                                <p class="mb-1">
                                    <i class="fas fa-map-marker-alt text-danger"></i> 
                                    ${escapeHtml(event.location)}
                                </p>
                            ` : ''}
                            <p class="mb-2">
                                <i class="fas fa-users text-success"></i> 
                                ${event.registrations || 0} registered
                                ${event.maxAttendees ? ` / ${event.maxAttendees} spots` : ''}
                            </p>
                            <button class="btn btn-primary btn-block" onclick="showEventDetails(${event.id})">
                                <i class="fas fa-info-circle"></i> View Details
                            </button>
                        </div>
                    </div>
                `;
                eventsList.appendChild(eventCard);
            });

            eventsList.style.display = 'flex';
            eventsList.style.flexWrap = 'wrap';
        }

        // Show event details in modal
        async function showEventDetails(eventId) {
            currentEventId = eventId;
            const modal = document.getElementById('eventModal');
            const modalTitle = document.getElementById('eventModalTitle');
            const modalBody = document.getElementById('eventModalBody');
            const registerBtn = document.getElementById('registerBtn');

            try {
                const response = await fetch(`${API_BASE_URL}/events/${eventId}`);
                const event = await response.json();

                const eventDate = new Date(event.eventDate);
                const formattedDate = eventDate.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                modalTitle.textContent = event.title;
                modalBody.innerHTML = `
                    <p><strong>Description:</strong><br>${escapeHtml(event.description || 'No description')}</p>
                    <p><strong>Date & Time:</strong><br>${formattedDate}</p>
                    ${event.location ? `<p><strong>Location:</strong><br>${escapeHtml(event.location)}</p>` : ''}
                    <p><strong>Organized by:</strong><br>${escapeHtml(event.createdByUsername || 'Library Staff')}</p>
                    <p><strong>Registration:</strong><br>
                        ${event.registrations || 0} registered
                        ${event.maxAttendees ? ` / ${event.maxAttendees} spots` : ''}
                    </p>
                `;

                // Show register button only if logged in
                if (authToken) {
                    registerBtn.style.display = 'block';
                    registerBtn.onclick = () => registerForEvent(eventId);
                } else {
                    registerBtn.style.display = 'none';
                }

                $(modal).modal('show');
            } catch (error) {
                console.error('Error loading event details:', error);
                alert('Failed to load event details. Please try again.');
            }
        }

        // Register for event
        async function registerForEvent(eventId) {
            if (!authToken) {
                alert('Please log in to register for events.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/events/${eventId}/register`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Successfully registered for the event!');
                    $('#eventModal').modal('hide');
                    loadEvents(); // Refresh events list
                } else {
                    alert(data.error || 'Failed to register. Please try again.');
                }
            } catch (error) {
                console.error('Error registering for event:', error);
                alert('Failed to register. Please try again.');
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
